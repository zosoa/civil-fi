<?xml version="1.0" encoding="UTF-8"?>
<!--
  ════════════════════════════════════════════════════════════════════
  CIVIL-FI CERTIFICATION BADGE — CCFP
  Certified Civil-Fi Practitioner
  Style: médaillon institutionnel inspiré de Corporate Finance Institute
  Couleur dominante: Navy Institut #1A2B5C
  ════════════════════════════════════════════════════════════════════
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-labelledby="title">
  <title id="title">CCFP — Certified Civil-Fi Practitioner</title>

  <defs>
    <!-- Path circulaire pour le rim text TOP (sens horaire, démarre 9h, traverse top, redescend 3h) -->
    <path id="ccfp-rim-top" d="M 32,160 A 128,128 0 0,1 288,160" />
    <!-- Path circulaire pour le rim text BOTTOM (lisible à l'endroit) -->
    <path id="ccfp-rim-bottom" d="M 36,168 A 124,124 0 0,0 284,168" />
  </defs>

  <rect width="320" height="320" fill="#FFFDF7"/>

  <!-- ═══ Anneau extérieur navy (porteur du rim text) ═══ -->
  <circle cx="160" cy="160" r="150" fill="#1A2B5C"/>
  <!-- Filet doré subtil sur l'anneau extérieur -->
  <circle cx="160" cy="160" r="150" fill="none" stroke="#C8A45A" stroke-width="0.6" opacity="0.6"/>
  <circle cx="160" cy="160" r="142" fill="none" stroke="#FFFDF7" stroke-width="0.4" opacity="0.4"/>

  <!-- ═══ Disque central crème ═══ -->
  <circle cx="160" cy="160" r="118" fill="#FFFDF7"/>
  <!-- Filet de séparation interne -->
  <circle cx="160" cy="160" r="118" fill="none" stroke="#1A2B5C" stroke-width="1"/>
  <circle cx="160" cy="160" r="113" fill="none" stroke="#1A2B5C" stroke-width="0.4" opacity="0.4"/>

  <!-- ═══ Rim text TOP — nom long de la certification ═══ -->
  <text font-family="'Fraunces', 'Cormorant Garamond', Georgia, serif" font-size="11" font-weight="600" letter-spacing="2.6" fill="#FFFDF7">
    <textPath href="#ccfp-rim-top" startOffset="50%" text-anchor="middle">CERTIFIED CIVIL-FI PRACTITIONER</textPath>
  </text>

  <!-- ═══ Rim text BOTTOM — Institut + millésime ═══ -->
  <text font-family="'Fraunces', 'Cormorant Garamond', Georgia, serif" font-size="9.6" font-weight="500" letter-spacing="2.4" fill="#FFFDF7" fill-opacity="0.85">
    <textPath href="#ccfp-rim-bottom" startOffset="50%" text-anchor="middle">INSTITUT CIVIL-FI PAFC®  ·  MMXXVI</textPath>
  </text>

  <!-- ═══ Diamants ornementaux Est/Ouest sur l'anneau ═══ -->
  <g fill="#C8A45A">
    <polygon points="304,160 296,154 296,166" />
    <polygon points="16,160 24,154 24,166" />
  </g>

  <!-- ═══ Petite étoile décorative au sommet du disque central ═══ -->
  <g transform="translate(160, 70)" fill="#1A2B5C">
    <polygon points="0,-7 1.7,-2 7,-2 2.8,1.4 4.2,6 0,3.5 -4.2,6 -2.8,1.4 -7,-2 -1.7,-2"/>
  </g>

  <!-- ═══ Couronne de petits points (au-dessus de l'acronyme) ═══ -->
  <g fill="#1A2B5C">
    <circle cx="120" cy="116" r="1.6"/>
    <circle cx="135" cy="113" r="1.2"/>
    <circle cx="160" cy="111" r="1.6"/>
    <circle cx="185" cy="113" r="1.2"/>
    <circle cx="200" cy="116" r="1.6"/>
  </g>

  <!-- ═══ Filets latéraux décoratifs ═══ -->
  <g stroke="#1A2B5C" stroke-width="0.6">
    <line x1="76" y1="158" x2="92" y2="158"/>
    <line x1="228" y1="158" x2="244" y2="158"/>
  </g>

  <!-- ═══ Acronyme central — grande typographie serif ═══ -->
  <text x="160" y="180" font-family="'Fraunces', 'Cormorant Garamond', 'Playfair Display', Georgia, serif" font-size="56" font-weight="600" fill="#1A2B5C" text-anchor="middle" letter-spacing="2">CCFP</text>

  <!-- ═══ Bandeau ribbon central avec mention ═══ -->
  <g transform="translate(160, 218)">
    <rect x="-72" y="-12" width="144" height="22" fill="#1A2B5C"/>
    <!-- Mini ribbon ends (chevron sides) -->
    <polygon points="-72,-12 -78,-1 -72,10" fill="#1A2B5C"/>
    <polygon points="72,-12 78,-1 72,10" fill="#1A2B5C"/>
    <!-- Inner chevron notches -->
    <polygon points="-72,-12 -68,-1 -72,10" fill="#FFFDF7"/>
    <polygon points="72,-12 68,-1 72,10" fill="#FFFDF7"/>
    <text x="0" y="3" font-family="'Fraunces', Georgia, serif" font-size="10" font-weight="600" letter-spacing="2.2" fill="#FFFDF7" text-anchor="middle">PRACTITIONER</text>
  </g>

  <!-- ═══ Filet décoratif sous le ribbon ═══ -->
  <line x1="124" y1="240" x2="196" y2="240" stroke="#C8A45A" stroke-width="0.6"/>

</svg>
