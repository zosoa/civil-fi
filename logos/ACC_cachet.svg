<?xml version="1.0" encoding="UTF-8"?>
<!--
  ════════════════════════════════════════════════════════════════════
  ACC — AVIS CIVIL DE CONFORMITÉ
  Cachet officiel, label de projet
  ════════════════════════════════════════════════════════════════════
  Style: tampon institutionnel français rectangulaire.
  Inspirations: cachets notariaux, "Vu et approuvé", marques NF AFNOR.
  Couleur unique: rouge bourgogne #8B1E3F
  Pas de chiffre 2 (cf. retour utilisateur).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240" role="img" aria-labelledby="title">
  <title id="title">ACC — Avis Civil de Conformité (cachet officiel)</title>

  <rect width="320" height="240" fill="#FFFDF7"/>

  <!-- ═══ Cadre extérieur (double border style cachet) ═══ -->
  <!-- Cadre externe épais -->
  <rect x="30" y="36" width="260" height="168" fill="none" stroke="#8B1E3F" stroke-width="3.5"/>
  <!-- Cadre interne fin -->
  <rect x="38" y="44" width="244" height="152" fill="none" stroke="#8B1E3F" stroke-width="0.8"/>

  <!-- ═══ Bandeau supérieur AVIS CIVIL DE CONFORMITÉ ═══ -->
  <!-- Filets décoratifs gauche et droite -->
  <line x1="52" y1="68" x2="78" y2="68" stroke="#8B1E3F" stroke-width="0.6"/>
  <line x1="242" y1="68" x2="268" y2="68" stroke="#8B1E3F" stroke-width="0.6"/>
  <!-- Petit losange ornemental central -->
  <polygon points="160,64 156,68 160,72 164,68" fill="#8B1E3F"/>

  <!-- Texte AVIS CIVIL DE CONFORMITÉ en deux lignes (ou une selon densité) -->
  <text x="160" y="88" font-family="'Fraunces', 'Cormorant Garamond', Georgia, serif" font-size="11" font-weight="600" letter-spacing="3" fill="#8B1E3F" text-anchor="middle">AVIS CIVIL DE CONFORMITÉ</text>

  <!-- ═══ Acronyme central dominant ═══ -->
  <text x="160" y="142" font-family="'Fraunces', 'Cormorant Garamond', 'Playfair Display', Georgia, serif" font-size="56" font-weight="700" letter-spacing="6" fill="#8B1E3F" text-anchor="middle">ACC</text>

  <!-- ═══ Filet de séparation horizontal sous l'acronyme ═══ -->
  <line x1="120" y1="160" x2="200" y2="160" stroke="#8B1E3F" stroke-width="1"/>
  <!-- Mini ornement central -->
  <circle cx="160" cy="160" r="2" fill="#8B1E3F"/>

  <!-- ═══ Mention basse: Institut + millésime ═══ -->
  <text x="160" y="180" font-family="'Fraunces', Georgia, serif" font-size="9" font-weight="600" letter-spacing="2" fill="#8B1E3F" text-anchor="middle">INSTITUT CIVIL-FI PAFC®  ·  MMXXVI</text>

  <!-- ═══ Petite mention "VU & APPROUVÉ" en mode tampon en bas ═══ -->
  <text x="160" y="194" font-family="'Fraunces', Georgia, serif" font-size="7" font-weight="500" font-style="italic" letter-spacing="2" fill="#8B1E3F" text-anchor="middle" opacity="0.7">vu &amp; approuvé par le Conseil</text>

  <!-- ═══ Coins ornementaux (décor "stamp") ═══ -->
  <g fill="#8B1E3F">
    <!-- Coin haut-gauche -->
    <rect x="38" y="44" width="10" height="2"/>
    <rect x="38" y="44" width="2" height="10"/>
    <!-- Coin haut-droit -->
    <rect x="272" y="44" width="10" height="2"/>
    <rect x="280" y="44" width="2" height="10"/>
    <!-- Coin bas-gauche -->
    <rect x="38" y="194" width="10" height="2"/>
    <rect x="38" y="186" width="2" height="10"/>
    <!-- Coin bas-droit -->
    <rect x="272" y="194" width="10" height="2"/>
    <rect x="280" y="186" width="2" height="10"/>
  </g>

</svg>
