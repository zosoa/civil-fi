<?xml version="1.0" encoding="UTF-8"?>
<!--
  CIVIL-FI · L'INSTITUT — Variation D : Cocarde + filet
  Petite cocarde tricolore circulaire à gauche + soulignement bleu sous le wordmark
  Lecture : la plus "officielle" — évoque tampon République sans la copier
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" width="260" height="80" role="img" aria-labelledby="title">
  <title id="title">Civil-Fi · L'Institut — variation cocarde tricolore</title>

  <rect width="260" height="80" fill="#FFFDF7"/>

  <!-- Cocarde tricolore : 3 cercles concentriques bleu / blanc / rouge -->
  <g transform="translate(28, 40)">
    <circle cx="0" cy="0" r="14" fill="#1A2B5C"/>
    <circle cx="0" cy="0" r="9" fill="#FFFDF7"/>
    <circle cx="0" cy="0" r="4" fill="#C8102E"/>
  </g>

  <g font-family="'Poppins', 'Helvetica Neue', sans-serif">
    <text x="54" y="46" font-size="24" font-weight="700" fill="#1A2B5C">Civil</text>
    <text x="120" y="46" font-size="24" font-weight="700" fill="#1A2B5C">·</text>
    <text x="130" y="46" font-size="24" font-weight="700" fill="#1A2B5C">Fi</text>
  </g>

  <!-- Filet de soulignement navy -->
  <line x1="54" y1="56" x2="158" y2="56" stroke="#1A2B5C" stroke-width="0.6"/>

  <text x="54" y="68" font-family="'Poppins', sans-serif" font-size="9" font-weight="600" letter-spacing="2.4" fill="#1A2B5C" fill-opacity="0.6">L'INSTITUT</text>
</svg>
